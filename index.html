<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>55ide 墨香中文编程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: system-ui, sans-serif;
        }
        .card {
            width: 300px;
            padding: 40px 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card h2 {
            font-size: 22px;
            margin-bottom: 12px;
            color: #333;
        }
        .card p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <a class="card" href="http://www.mxide.com" target="_blank">
        <h2>MXIDE</h2>
        <p>点击前往官网</p>
    </a>
</body>
</html>
